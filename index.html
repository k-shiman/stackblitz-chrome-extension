<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stackblitz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-default">
  <div id="ui">
    <div class="btn-group">
      <button id="btn-easy">Easy</button>
      <button id="btn-medium">Medium</button>
      <button id="btn-hard">Hard</button>
    </div>
    <div class="btn-group">
      <button id="btn-theme">Change Theme</button>
      <button id="btn-pause">Pause</button>
    </div>
    <div id="status">
      <div class="stat">
        <span class="stat-label">Score</span>
        <span class="stat-value" id="score">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Best</span>
        <span class="stat-value" id="high-score">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Level</span>
        <span class="stat-value" id="level">1</span>
      </div>
      <div class="stat">
        <span class="stat-label">Time</span>
        <span class="stat-value"><span id="timer">0</span>s</span>
      </div>
    </div>
  </div>

  <div id="game-wrapper">
    <canvas id="game-canvas" width="200" height="400"></canvas>
    <div id="pause-overlay">
      <span class="pause-title">PAUSED</span>
      <span class="pause-hint">Press P to resume</span>
    </div>
    <div id="combo-popup"></div>
  </div>

  <div id="side-panels">
    <div class="panel">
      <span class="panel-label">Hold</span>
      <canvas id="hold" width="80" height="80"></canvas>
      <span class="panel-hint">C key</span>
    </div>
    <div class="panel">
      <span class="panel-label">Next</span>
      <canvas id="next" width="80" height="80"></canvas>
    </div>
  </div>

  <div id="message"></div>

  <script src="script.js"></script>
</body>
</html>
